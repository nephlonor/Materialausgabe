<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0d10" />
  <title>Materialausgabe</title>
  <link rel="stylesheet" href="css/style.css?v=9" />
</head>
<body>
  <div id="app">
    <header class="topbar">
      <h1 id="page-title">Materialausgabe</h1>
      <button id="settings-btn" class="icon-btn" title="Einstellungen" aria-label="Einstellungen">⚙</button>
    </header>

    <nav class="tabs" id="tabs" hidden style="display:none">
      <button class="tab active" data-view="book">Buchen</button>
      <button class="tab" data-view="list">Buchungsliste</button>
      <button class="tab" data-view="edit">Anpassen</button>
    </nav>

    <main id="main"></main>

    <div id="toast" class="toast" hidden style="display:none"></div>
    <div id="modal" class="modal" hidden style="display:none">
      <div class="modal-card">
        <h3 id="modal-title"></h3>
        <div id="modal-body"></div>
        <div class="modal-actions">
          <button id="modal-cancel" class="btn ghost">Abbrechen</button>
          <button id="modal-ok" class="btn primary">OK</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/config.js?v=9"></script>
  <script src="js/materials.js?v=9"></script>
  <script src="js/github.js?v=9"></script>
  <script src="js/app.js?v=9"></script>
</body>
</html>
