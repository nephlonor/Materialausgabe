name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Inject GitHub token and build id
        env:
          MA_GITHUB_TOKEN: ${{ secrets.MA_GITHUB_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          if [ -z "$MA_GITHUB_TOKEN" ]; then
            echo "::warning::MA_GITHUB_TOKEN secret is not set – bookings will not work."
          fi
          export BUILD_ID="${GITHUB_SHA:0:7}-$(date +%s)"
          echo "Build id: $BUILD_ID"
          python3 - <<'PY'
          import os, pathlib
          token = os.environ.get('MA_GITHUB_TOKEN', '')
          build_id = os.environ['BUILD_ID']
          p = pathlib.Path('js/config.js')
          p.write_text(p.read_text().replace('__MA_TOKEN__', token))
          p = pathlib.Path('index.html')
          p.write_text(p.read_text().replace('__BUILD_ID__', build_id))
          PY
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4
